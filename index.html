<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moja strona</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { margin-bottom: 10px; }
    p { color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Witaj na mojej stronie 🚀</h1>
    <p>Ta strona działa za darmo na GitHub Pages.</p>
  </div>
</body>
</html>
